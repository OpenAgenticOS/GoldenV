name: Build Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: 要构建的分支或 tag
        required: false
        default: main
      release_tag:
        description: Release 标签（如 v0.1.0），将自动创建公开下载
        required: true
        default: v0.1.0
      prerelease:
        description: 标记为预发布版本
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CI: true
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build GoldenV (PyInstaller + Inno Setup)
        env:
          PIP_CONFIG_FILE: pip.conf
        shell: pwsh
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt pyinstaller
          pwsh -ExecutionPolicy Bypass -File scripts/build_win.ps1

      - name: Verify build outputs
        shell: pwsh
        run: |
          if (-not (Test-Path dist/GoldenV/GoldenV.exe)) {
            throw "Missing dist/GoldenV/GoldenV.exe"
          }
          Get-ChildItem dist/GoldenV/GoldenV.exe, Output/GoldenV_Setup.exe -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Package portable zip
        shell: pwsh
        run: |
          if (Test-Path Output/GoldenV-portable-win64.zip) {
            Remove-Item Output/GoldenV-portable-win64.zip
          }
          Compress-Archive -Path dist/GoldenV/* -DestinationPath Output/GoldenV-portable-win64.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GoldenV-windows-${{ env.RELEASE_TAG }}-${{ github.run_number }}
          path: |
            dist/GoldenV/
            Output/GoldenV_Setup.exe
            Output/GoldenV-portable-win64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: GoldenV ${{ env.RELEASE_TAG }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          make_latest: true
          files: |
            Output/GoldenV_Setup.exe
            Output/GoldenV-portable-win64.zip
            docs/GoldenV_安装使用手册.pdf
          fail_on_unmatched_files: false
