name: Build Windows

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 要构建的分支或 tag
        required: false
        default: main
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build GoldenV (PyInstaller + Inno Setup)
        env:
          PIP_CONFIG_FILE: pip.conf
        shell: pwsh
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt pyinstaller
          pwsh -ExecutionPolicy Bypass -File scripts/build_win.ps1

      - name: Verify build outputs
        shell: pwsh
        run: |
          if (-not (Test-Path dist/GoldenV/GoldenV.exe)) {
            throw "Missing dist/GoldenV/GoldenV.exe"
          }
          Get-ChildItem dist/GoldenV/GoldenV.exe, Output/GoldenV_Setup.exe -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GoldenV-windows-${{ github.run_number }}
          path: |
            dist/GoldenV/
            Output/GoldenV_Setup.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/GoldenV_Setup.exe
          fail_on_unmatched_files: false
