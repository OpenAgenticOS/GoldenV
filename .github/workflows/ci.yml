name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0 libxkbcommon-x11-0 libegl1
      - name: Install Python deps
        env:
          PIP_CONFIG_FILE: ${{ github.workspace }}/pip.conf
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Pytest
        run: pytest -q
      - name: Headless app smoke
        run: python -m goldenv.app --headless-test --simulate
